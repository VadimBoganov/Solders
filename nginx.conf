server {
    listen 8082;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Behind the Caddy TLS proxy: issue relative redirects so the internal
    # host/port (localhost:8082, http) never leaks into the browser URL when
    # nginx appends a trailing slash to directory requests (e.g. /pripoi).
    absolute_redirect off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
